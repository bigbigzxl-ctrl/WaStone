id: stm32f407vet6
name: STM32F407VET6 custom board
mcu: stm32f407vet6
family: stm32f4
description: >
  STM32F407VET6 custom board via ESP32JTAG (SWD over WiFi).
  NOTE: MCU is STM32F407VET6 (512 KB Flash), NOT STM32F407VGT6 (1 MB Flash)
  used on the STM32F4 Discovery. Same peripherals, half the flash.

classification:
  platform_class: mcu
  vendor: st
  family: stm32
  series: stm32f4
  line: stm32f407
  part_number: stm32f407vet6

board:
  vendor: custom
  form_factor: custom

mcus:
  - id: main
    mcu: stm32f407vet6
    family: stm32f4
    role: dut
    flash_kb: 512          # VET6 = 512 KB — different from VGT6 (1 MB) on Discovery
    sram_kb: 192
    clock_hz: 16000000
    build:
      type: arm_debug
      project_dir: firmware/targets/stm32f407vet6_blink
    flash:
      method: bmda_gdb

board_configs:
  - id: esp32jtag
    path: configs/boards/stm32f407vet6.yaml
    instrument_family: esp32jtag
    primary: true

lifecycle_stage: golden

build:
  type: arm_debug
  project_dir: firmware/targets/stm32f407vet6_blink
flash:
  method: bmda_gdb
tags:
  - stm32
  - stm32f4
  - stm32f407
  - esp32jtag
  - custom_board
verified:
  status: true
  date: 2026-03-31
  bench_id: esp32jtag_stm32_golden

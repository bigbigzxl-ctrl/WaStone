id: stm32f103_gpio
name: STM32F103 Bluepill GPIO Bench
mcu: stm32f103c8t6
family: stm32f1
description: STM32F103C8T6 Bluepill GPIO/signature bench DUT

classification:
  platform_class: mcu
  vendor: st
  family: stm32
  series: stm32f1
  line: stm32f103
  part_number: stm32f103c8t6

board:
  vendor: Generic
  form_factor: bluepill

mcus:
  - id: main
    mcu: stm32f103c8t6
    family: stm32f1
    role: dut
    clock_hz: 8000000
    build:
      type: arm_debug
      project_dir: firmware/targets/stm32f103
    flash:
      method: gdb_swd

board_configs:
  - id: esp32jtag
    path: configs/boards/stm32f103_gpio.yaml
    instrument_family: esp32jtag
    primary: true
  - id: stlink
    path: configs/boards/stm32f103_gpio_stlink.yaml
    instrument_family: stlink

lifecycle_stage: golden

build:
  type: cmake
  project_dir: firmware
flash:
  method: gdb_swd
default_packs:
  - packs/stm32f103c8t6_golden.json
tags:
  - stm32
  - stm32f1
  - bluepill
  - gpio_bench
verified:
  status: true
  verified_on:
    bench_id: default
  date: 2026-03-13

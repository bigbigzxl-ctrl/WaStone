id: rp2040_pico
name: RP2040 Pico
mcu: rp2040
family: rp2040
description: Raspberry Pi Pico (RP2040) blink + LA verify

classification:
  platform_class: mcu
  vendor: raspberry_pi
  family: rp2040
  series: rp2040
  line: rp2040
  part_number: rp2040

board:
  vendor: Raspberry Pi Foundation
  form_factor: pico

mcus:
  - id: main
    mcu: rp2040
    family: rp2040
    role: dut
    clock_hz: 125000000
    build:
      type: pico
      project_dir: firmware
    flash:
      method: gdb_swd

board_configs:
  - id: esp32jtag
    path: configs/boards/rp2040_pico.yaml
    instrument_family: esp32jtag
    primary: true
  - id: s3jtag
    path: configs/boards/rp2040_pico_s3jtag.yaml
    instrument_family: esp32jtag
    primary: false
  - id: s3jtag_uart
    path: configs/boards/rp2040_pico_s3jtag_uart.yaml
    instrument_family: esp32jtag
    primary: false

lifecycle_stage: golden

build:
  type: pico
  project_dir: firmware
flash:
  method: gdb_swd
default_packs:
  - packs/smoke.json
tags:
  - pico
  - rp2040
verified:
  status: true
  verified_on:
    bench_id: default
  date: 2026-02-28

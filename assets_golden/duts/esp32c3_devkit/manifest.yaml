id: esp32c3_devkit
name: ESP32-C3 DevKit
mcu: esp32c3
family: esp32
description: ESP32-C3 DevKit GPIO waveform + UART banner (minimal phase-1 path)

classification:
  platform_class: mcu
  vendor: espressif
  family: esp32
  series: esp32c3
  line: esp32c3
  part_number: esp32c3

board:
  vendor: Espressif
  form_factor: devkit

mcus:
  - id: main
    mcu: esp32c3
    family: esp32
    role: dut
    clock_hz: 160000000
    build:
      type: idf
      project_dir: firmware
    flash:
      method: idf_esptool

board_configs:
  - id: default
    path: configs/boards/esp32c3_devkit.yaml
    instrument_family: esp32_meter
    primary: true

lifecycle_stage: draft

build:
  type: idf
  project_dir: firmware
flash:
  method: idf_esptool
default_packs:
  - packs/ezlink_dev.json
tags:
  - esp32
  - esp32c3
  - devkit
verified:
  status: false
  verified_on:
    bench_id: pending_hw
  date: 2026-03-07

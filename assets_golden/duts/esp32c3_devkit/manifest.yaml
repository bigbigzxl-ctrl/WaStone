id: esp32c3_devkit
name: ESP32-C3 DevKit
mcu: esp32c3
family: esp32
description: Legacy ESP32-C3 DevKit phase-1 path; superseded by the canonical native-USB full-suite DUT

classification:
  platform_class: mcu
  vendor: espressif
  family: esp32
  series: esp32c3
  line: esp32c3
  part_number: esp32c3

board:
  vendor: Espressif
  form_factor: devkit

mcus:
  - id: main
    mcu: esp32c3
    family: esp32
    role: dut
    clock_hz: 160000000
    build:
      type: idf
      project_dir: firmware
    flash:
      method: idf_esptool

board_configs:
  - id: default
    path: configs/boards/esp32c3_devkit.yaml
    instrument_family: esp32_meter
    primary: true

lifecycle_stage: draft

build:
  type: idf
  project_dir: firmware
flash:
  method: idf_esptool
default_packs:
  - packs/ezlink_dev.json
tags:
  - esp32
  - esp32c3
  - devkit
  - legacy_path
notes:
  canonical_replacement: assets_golden/duts/esp32c3_devkit_native_usb/manifest.yaml
  canonical_pack: packs/esp32c3_full_suite.json
  status: Retained only as an early phase-1 path. Do not use as the canonical ESP32-C3 golden suite entry.
verified:
  status: false

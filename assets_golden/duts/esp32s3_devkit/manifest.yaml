id: esp32s3_devkit
name: ESP32-S3 DevKit
mcu: esp32s3
family: esp32
description: ESP32-S3 DevKit GPIO waveform + UART banner

classification:
  platform_class: mcu
  vendor: espressif
  family: esp32
  series: esp32s3
  line: esp32s3
  part_number: esp32s3

board:
  vendor: Espressif
  form_factor: devkit

mcus:
  - id: main
    mcu: esp32s3
    family: esp32
    role: dut
    clock_hz: 240000000
    build:
      type: idf
      project_dir: firmware
    flash:
      method: idf_esptool

board_configs:
  - id: default
    path: configs/boards/esp32s3_devkit.yaml
    instrument_family: esp32_meter
    primary: true

lifecycle_stage: golden

build:
  type: idf
  project_dir: firmware
flash:
  method: idf_esptool
default_packs:
  - packs/ezlink_dev.json
tags:
  - esp32
  - esp32s3
  - devkit
verified:
  status: true
  verified_on:
    bench_id: default
  date: 2026-02-28

id: stm32f103_uart
name: STM32F103 Bluepill UART Bench
mcu: stm32f103c8t6
family: stm32f1
description: Legacy STM32F103C8T6 Bluepill UART bridge bench DUT; not the canonical staged golden suite path

classification:
  platform_class: mcu
  vendor: st
  family: stm32
  series: stm32f1
  line: stm32f103
  part_number: stm32f103c8t6

board:
  vendor: Generic
  form_factor: bluepill

mcus:
  - id: main
    mcu: stm32f103c8t6
    family: stm32f1
    role: dut
    clock_hz: 8000000
    build:
      type: arm_debug
      project_dir: firmware/targets/stm32f103_uart
    flash:
      method: gdb_swd

board_configs:
  - id: esp32jtag
    path: configs/boards/stm32f103_uart.yaml
    instrument_family: esp32jtag
    primary: true

lifecycle_stage: golden

build:
  type: cmake
  project_dir: firmware
flash:
  method: gdb_swd
tags:
  - stm32
  - stm32f1
  - bluepill
  - uart_bench
  - legacy_path
notes:
  canonical_replacement: assets_golden/duts/stm32f103_gpio/manifest.yaml
  canonical_pack: packs/stm32f103c8t6_golden.json
  status: Retained for historical USB-UART bridge coverage only. Do not use as the canonical STM32F103C8T6 golden suite entry.
verified:
  status: true
  verified_on:
    bench_id: default
  date: 2026-03-13

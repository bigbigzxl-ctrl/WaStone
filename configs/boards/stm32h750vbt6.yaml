board:
  name: STM32H750VBT6 YD
  target: stm32h750vbt6
  instrument_instance: esp32jtag_h750_bench
  clock_hz: 64000000
  kind: board
  features:
    - programmable_via_swd
    - has_reset_pin
    - has_gpio
    - has_uart_console
  default_bench_profile: stm32h750vbt6__default
  build:
    type: arm_debug
    project_dir: firmware/targets/stm32h750_minimal_runtime_mailbox
    artifact_stem: stm32h750_minimal_runtime_mailbox_app
  flash:
    speed_khz: 1000
    reset_strategy: connect_under_reset
    post_load_settle_s: 5.0
    target_id: 1
    reset_available: false
    gdb_launch_cmds:
      - "monitor swdp_scan"
      - "file {firmware}"
      - "attach {target_id}"
      - "load"
      - "detach"
  power_and_boot:
    reset_strategy: connect_under_reset
    boot_mode_default: normal
    power_rails:
      - name: VDD
        nominal_v: 3.3

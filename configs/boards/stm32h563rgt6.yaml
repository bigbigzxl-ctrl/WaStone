board:
  name: STM32H563RGT6
  target: stm32h563rgt6
  instrument_instance: daplink_h563rgt6_local
  clock_hz: 64000000        # HSI default after reset
  kind: board
  features:
    - programmable_via_swd
    - has_gpio
    - has_uart_console
  default_bench_profile: stm32h563rgt6__default
  build:
    type: arm_debug
    project_dir: firmware/targets/stm32h563rgt6_minimal_runtime_mailbox
    artifact_stem: stm32h563rgt6_minimal_runtime_mailbox_app
  flash:
    speed_khz: 1000
    reset_strategy: connect_under_reset
    post_load_settle_s: 2.0
    target_id: 1
    gdb_launch_cmds:
      - "monitor reset halt"
      - "file {firmware}"
      - "load"
      - "monitor reset run"
      - "detach"
  mailbox_verify_defaults:
    skip_attach: true
    halt_before_read: false
    address: "0x20007F00"
  power_and_boot:
    reset_strategy: connect_under_reset
    boot_mode_default: normal
    power_rails:
      - name: VDD
        nominal_v: 3.3

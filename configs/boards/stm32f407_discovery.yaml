board:
  name: STM32F4 Discovery
  target: stm32f407_discovery
  instrument_instance: stlink_f407_discovery
  clock_hz: 16000000
  kind: board
  features:
    - programmable_via_swd
    - has_gpio
    - has_uart_console
  default_bench_profile: stm32f407_discovery__default
  build:
    type: arm_debug
    project_dir: firmware/targets/stm32f407_discovery
    artifact_stem: stm32f407_discovery_app
  flash:
    speed_khz: 1000
    reset_strategy: none
    post_load_settle_s: 2.0
    target_id: 1
    gdb_launch_cmds:
      - "file {firmware}"
      - "load"
      - "monitor reset run"
      - "disconnect"
  mailbox_verify_defaults:
    skip_attach: true
  power_and_boot:
    reset_strategy: none
    boot_mode_default: normal
    power_rails:
      - name: VDD
        nominal_v: 3.3

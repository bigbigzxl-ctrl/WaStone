board:
  name: STM32F103 Bluepill GPIO Bench
  target: stm32f103c8t6
  instrument_instance: esp32jtag_stm32f103_golden
  clock_hz: 8000000
  default_bench_profile: stm32f103_gpio__default
  build:
    type: arm_debug
    project_dir: firmware/targets/stm32f103
    artifact_stem: stm32f103_app
  firmware:
    description: Toggle PA4-PA7 fast, blink PC13 at 0.5 s intervals
  flash:
    speed_khz: 1000
    reset_strategy: connect_under_reset
    post_load_settle_s: 5.0
    notice_output_keywords:
      - "warning"
      - "error"
    target_id: 1
    gdb_launch_cmds:
      - "file {firmware}"
      - "monitor a"
      - "attach {target_id}"
      - "load"
      - "attach {target_id}"
      - "detach"
  mailbox_verify_defaults:
    attach_monitor_cmd: "monitor a"
    skip_attach: false
  power_and_boot:
    reset_strategy: connect_under_reset
    boot_mode_default: normal
    power_rails:
      - name: VDD
        nominal_v: 3.3

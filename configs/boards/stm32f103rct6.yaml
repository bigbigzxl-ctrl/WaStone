board:
  name: STM32F103RCT6
  target: stm32f103rct6
  instrument_instance: daplink_f103_rct6
  clock_hz: 8000000
  build:
    type: arm_debug
    project_dir: firmware/targets/stm32f103rct6_mailbox
    artifact_stem: stm32f103rct6_mailbox_app
  flash:
    speed_khz: 1000
    reset_strategy: connect_under_reset
    post_load_settle_s: 2.0
    target_id: 1
    gdb_launch_cmds:
      - "monitor reset halt"
      - "file {firmware}"
      - "load"
      - "monitor reset run"
      - "detach"
  mailbox_verify_defaults:
    skip_attach: true
    halt_before_read: false
  default_wiring:
    swd: "external"
    reset: "NC"
    verify: "NC"
    uart: "daplink_usb_uart"
  power_and_boot:
    reset_strategy: connect_under_reset
    boot_mode_default: normal
    power_rails:
      - name: VDD
        nominal_v: 3.3

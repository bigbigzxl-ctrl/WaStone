board:
  name: STM32F401 Black Pill DAPLink
  target: stm32f401ce_blackpill
  instrument_instance: daplink_stm32f401_blackpill_local
  clock_hz: 16000000
  kind: board
  features:
    - programmable_via_swd
    - has_gpio
    - has_uart
    - has_usb_device
    - has_timer
  default_bench_profile: stm32f401ce_blackpill_daplink__default
  build:
    type: arm_debug
    project_dir: firmware/targets/stm32f401ce
    artifact_stem: stm32f401ce_blackpill_app
  firmware:
    description: STM32F401 Black Pill local DAPLink bench with SWD on DAPLink, host UART on USART1 PA9/PA10, and target USB FS on PA11/PA12
  flash:
    speed_khz: 1000
    reset_strategy: connect_under_reset
    post_load_settle_s: 2.0
    target_id: 1
    gdb_launch_cmds:
      - "monitor reset halt"
      - "file {firmware}"
      - "load"
      - "monitor reset run"
      - "detach"
  mailbox_verify_defaults:
    skip_attach: true
    halt_before_read: false
  bench_connections:
    - from: SWDIO
      to: DAPLink SWDIO
    - from: SWCLK
      to: DAPLink SWCLK
    - from: PA9
      to: DAPLink RX
    - from: DAPLink TX
      to: PA10
    - from: PA11
      to: USB D-
    - from: PA12
      to: USB D+
    - from: PC13
      to: LED
    - from: GND
      to: DAPLink GND
  safe_pins:
    - PA9
    - PA10
    - PC13
  default_wiring:
    swd: "external"
    reset: "NC"
    verify: "LED"
    uart: "daplink_bridge"
    usb: "target_usb_fs"
  power_and_boot:
    reset_strategy: connect_under_reset
    boot_mode_default: normal
    power_rails:
      - name: VDD
        nominal_v: 3.3

# Known board alias registry for AEL.
#
# Maps common board names and aliases to their canonical AEL DUT id.
# Used by `ael project create` to recognize known board names in --target-mcu
# and apply the known-board clarify-first policy (known_board_clarify_first_policy_v0_1.md).
#
# Fields:
#   dut_id      - canonical AEL golden DUT id (must match assets_golden/duts/<id>)
#   board_name  - human-readable canonical board name
#   mcu         - primary MCU part number
#   aliases     - list of alternative names (case-insensitive matching)
#   notes       - optional notes about board variants or differences

boards:

  # ── STM32F4xx ──────────────────────────────────────────────────────────────
  - dut_id: stm32f407_discovery
    board_name: STM32F4 Discovery (STM32F407VGT6)
    mcu: stm32f407vgt6
    aliases:
      - stm32f4 discovery
      - stm32f4-discovery
      - stm32f4disco
      - stm32f4_disco
      - f4 discovery
      - f4disco
      - stm32f407 discovery
      - stm32f407vgt6
      - stm32f407vg
      - stm32f407
    notes: >
      ST STM32F4 Discovery board (MB997). STM32F407VGT6 Cortex-M4F, 1MB flash, 192KB RAM.
      Onboard ST-Link/V2 (idVendor=0483, idProduct=3748) for SWD.
      UART console: PA2 (USART2_TX, AF7) → CH341 USB-serial → /dev/ttyUSB0, 115200 8N1.
      UART loopback: PD5 (USART2_TX) ↔ PD6 (USART2_RX, AF7) — PA9/PA10 conflict with ST-Link UART bridge.
      Instrument: stlink_f407_discovery (GDB server port 4242).

  - dut_id: stm32f411ceu6
    board_name: WeAct Black Pill V2.0 (STM32F411CEU6)
    mcu: stm32f411ceu6
    aliases:
      - black pill
      - blackpill
      - black_pill
      - weact black pill
      - weact blackpill
      - stm32f411
      - stm32f411ce
      - stm32f411ceu6
      - stm32 black pill
    notes: >
      WeAct Black Pill V2.0. LED on PC13 (active-high). GPIO signature uses PA2/PA3.
      Instrument reference: esp32jtag. Bench wiring: PA2→P0.0, PA3→P0.1, SWD→P3.

  - dut_id: stm32f401rct6
    board_name: STM32F401RCT6 board
    mcu: stm32f401rct6
    aliases:
      - stm32f401
      - stm32f401rc
      - stm32f401rct6
      - nucleo f401
      - nucleo-f401
    notes: >
      STM32F401RCT6 golden reference board. Cortex-M4, 256K flash, 64K RAM.

  - dut_id: stm32g431cbu6
    board_name: STM32G431CBU6 (WeAct Black Pill style)
    mcu: stm32g431cbu6
    aliases:
      - stm32g431
      - stm32g431cb
      - stm32g431cbu6
      - g431
      - stm32g4
    notes: >
      STM32G431CBU6 QFP48 (LQFP48), WeAct CoreBoard V1.0. Cortex-M4, 128K flash, 32K RAM.
      LED on PA8 (active-high). GPIO bus on AHB2 (0x48000000) — different from STM32F4 AHB1.
      GPIO signature uses PA2/PA3. Instrument: esp32jtag_stm32_golden.

  # ── STM32F1xx ──────────────────────────────────────────────────────────────
  - dut_id: stm32f103
    board_name: STM32F103 Blue Pill
    mcu: stm32f103
    aliases:
      - blue pill
      - bluepill
      - blue_pill
      - stm32f103
      - stm32f103c8
      - stm32f103c8t6
      - stm32 blue pill
    notes: >
      Generic STM32F103C8T6 "Blue Pill" clone. LED on PC13 (active-low). Cortex-M3.
      Primary golden reference for stm32f1xx family.

  # ── Raspberry Pi (RP) ──────────────────────────────────────────────────────
  - dut_id: rp2040_pico
    board_name: Raspberry Pi Pico (RP2040)
    mcu: rp2040
    aliases:
      - raspberry pi pico
      - rpi pico
      - pico
      - rp2040
      - rp2040 pico
      - pi pico
    notes: >
      Official Raspberry Pi Pico. LED on GPIO25. Cortex-M0+ dual-core.
      Flash via picoprobe (SWD). GPIO signature uses GPIO2/GPIO3.

  - dut_id: rp2350_pico2
    board_name: Raspberry Pi Pico 2 (RP2350)
    mcu: rp2350
    aliases:
      - raspberry pi pico 2
      - pico 2
      - rp2350
      - rp2350 pico2
      - pico2
    notes: >
      Official Raspberry Pi Pico 2. RP2350 dual-core Cortex-M33.

  # ── ESP32 ──────────────────────────────────────────────────────────────────
  - dut_id: esp32c6_devkit
    board_name: ESP32-C6 DevKit
    mcu: esp32c6
    aliases:
      - esp32c6
      - esp32-c6
      - esp32 c6
      - esp32c6 devkit
      - esp32-c6-devkit
    notes: >
      Official Espressif ESP32-C6 DevKit. RISC-V, Wi-Fi 6, Bluetooth 5.
      Flash via USB/UART (esptool). GPIO signature uses GPIO4/GPIO5.

  - dut_id: esp32c3_devkit
    board_name: ESP32-C3 DevKit
    mcu: esp32c3
    aliases:
      - esp32c3
      - esp32-c3
      - esp32 c3
      - esp32c3 devkit
    notes: >
      Official Espressif ESP32-C3 DevKit. RISC-V single-core.

  - dut_id: esp32s3_devkit
    board_name: ESP32-S3 DevKit
    mcu: esp32s3
    aliases:
      - esp32s3
      - esp32-s3
      - esp32 s3
      - esp32s3 devkit
    notes: >
      Official Espressif ESP32-S3 DevKit. Xtensa LX7 dual-core, USB-OTG.

  # ── WCH CH32V ──────────────────────────────────────────────────────────────
  - dut_id: ch32v203xxx
    board_name: nanoCH32V203 v1.1 (CH32V203C8T6)
    mcu: ch32v203c8t6
    aliases:
      - ch32v203
      - ch32v203c8t6
      - nanoch32v203
      - nano ch32v203
      - ch32v203xxx
      - wch ch32v203
    notes: >
      nanoCH32V203 v1.1 board. WCH CH32V203C8T6 RISC-V RV32IMAC, 64KB flash,
      20KB SRAM, 72MHz PLL, dual USB-C (USB FS + CDC), CAN1 (PB8/PB9 remap).
      Instrument: WCHLink (fw 2.18, PID 8010) via SDI transport.
      Flash via wch_openocd. Mailbox at 0x20000600. Linker origin 0x00000000.
      GPIO loopback: PA2↔PA3, PA9↔PA10, PA7↔PA6, PA8↔PA0 (Stage 1).
      Encoder (Stage 2): PA0↔PA6, PA1↔PA7.

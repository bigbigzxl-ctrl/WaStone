instance:
  id: esp32jtag_h750_bench
  type: esp32jtag
  label: ESP32JTAG H750 Bench

connection:
  ip: 192.168.2.63
  gdb_port: 4242

communication:
  primary: gdb_remote
  surfaces:
    - name: gdb_remote
      transport: wifi
      endpoint: 192.168.2.63:4242
      protocol: gdb_remote
      invocation_style: request_response
    - name: web_api
      transport: wifi
      endpoint: https://192.168.2.63:443
      protocol: esp32jtag_web_api_v1
      invocation_style: request_response
      auth:
        type: basic
      options:
        tls_verify: false

capability_surfaces:
  swd: gdb_remote
  gpio_in: web_api
  gpio_out: web_api
  adc_in: web_api
  reset_out: web_api

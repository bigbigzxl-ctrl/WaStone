instance:
  id: daplink_f030_c8_local
  type: daplink
  label: DAPLink — STM32F030C8T6 (local USB, OpenOCD)

connection:
  endpoint: "local:cmsis-dap"
  serial_port: "/dev/ttyACM0"
  ip: "127.0.0.1"
  gdb_port: 3333
  gdb_cmd: "gdb-multiarch"

communication:
  primary: gdb_remote
  surfaces:
    - name: gdb_remote
      transport: usb_local
      endpoint: "127.0.0.1:3333"
      protocol: gdb_remote
      invocation_style: request_response
    - name: uart_console
      transport: usb_local
      endpoint: "/dev/ttyACM0"
      protocol: uart
      invocation_style: request_response

capability_surfaces:
  swd: gdb_remote
  uart: uart_console

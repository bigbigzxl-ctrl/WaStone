instance:
  id: daplink_stm32f401ccu6_local
  type: daplink
  label: DAPLink — STM32F401CCU6 (local USB, OpenOCD)

connection:
  endpoint: "local:cmsis-dap"
  serial_port: "/dev/serial/by-id/usb-jixin.pro_CMSIS-DAP_CZ_CZ_2023_6688-if00"
  ip: "127.0.0.1"
  gdb_port: 3333
  gdb_cmd: "arm-none-eabi-gdb"

communication:
  primary: gdb_remote
  surfaces:
    - name: gdb_remote
      transport: usb_local
      endpoint: "127.0.0.1:3333"
      protocol: gdb_remote
      invocation_style: request_response
    - name: uart_console
      transport: usb_local
      endpoint: "/dev/serial/by-id/usb-jixin.pro_CMSIS-DAP_CZ_CZ_2023_6688-if00"
      protocol: uart
      invocation_style: request_response

capability_surfaces:
  swd: gdb_remote
  uart: uart_console

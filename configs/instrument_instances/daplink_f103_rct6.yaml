instance:
  id: daplink_f103_rct6
  type: daplink
  label: DAPLink — STM32F103RCT6 (local USB, OpenOCD)

connection:
  endpoint: "local:cmsis-dap-lu"
  serial_port: "/dev/ttyACM0"
  ip: "127.0.0.1"
  gdb_port: 3334
  gdb_cmd: "arm-none-eabi-gdb"

communication:
  primary: gdb_remote
  surfaces:
    - name: gdb_remote
      transport: usb_local
      endpoint: "127.0.0.1:3334"
      protocol: gdb_remote
      invocation_style: request_response
    - name: uart_console
      transport: usb_local
      endpoint: "/dev/ttyACM0"
      protocol: uart
      invocation_style: request_response

capability_surfaces:
  swd: gdb_remote
  uart: uart_console

# OpenOCD config for STM32F103RCT6 with CMSIS-DAP probe (DAPLink)
#
# stm32f103_mini's default openocd.cfg uses interface/stlink-dap.cfg
# (ST-Link v2.1+ DAP direct transport). This override replaces it with
# standard CMSIS-DAP for use with a DAPLink probe.
#
# Used by: tests/plans/stm32f103rct6_zephyr_*.json
#   flash.openocd_config = "firmware/targets/stm32f103rct6_zephyr_hello_loop/openocd_cmsis_dap.cfg"
#
# Hardware notes:
#   - DAPLink probe has no nRESET line connected to the F103 board
#     (only SWD + UART + GND wired in the golden suite bench setup)
#   - reset_config none: uses software SYSRESETREQ via Cortex-M AIRCR
#   - examine-fail handler: forces arp_examine override so OpenOCD can
#     attach to a running Zephyr target that briefly blocks AP access
#     during the initial SWD examination window

source [find interface/cmsis-dap.cfg]
transport select swd

# STM32F1 target (F103RCT6 = high-density, 256KB Flash)
source [find target/stm32f1x.cfg]

# No hardware RESET line: use software reset only (SYSRESETREQ via AIRCR)
reset_config none

# When the MCU is running Zephyr, the SWD AP briefly fails examination
# (OpenOCD reads 0xe000ed04 which times out during active code execution).
# Force examination with override so flash programming can proceed.
$_TARGETNAME configure -event examine-fail {
    stm32f1x.cpu arp_examine override
}

# OpenOCD config for STM32F103 Blue Pill with CMSIS-DAP probe (DAPLink)
#
# stm32_min_dev's default openocd.cfg uses interface/stlink.cfg.
# This override replaces it with cmsis-dap for use with DAPLink or
# any other CMSIS-DAP compatible debugger.
#
# Used by: tests/plans/stm32f103_bluepill_zephyr_hello_loop.json
#   flash.openocd_config = "firmware/targets/stm32f103_bluepill_zephyr_hello_loop/openocd_cmsis_dap.cfg"

source [find interface/cmsis-dap.cfg]
transport select swd

# STM32F1 target (covers C6T6, C8T6, RCT6 variants)
source [find target/stm32f1x.cfg]

# Work area in SRAM (20 kB for C8/RC; safe minimum for C6 = 10 kB)
set WORKAREASIZE 0x2800

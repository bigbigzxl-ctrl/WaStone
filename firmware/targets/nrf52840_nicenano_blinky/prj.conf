# nice!nano blinky — Stage 0 visual health check
# LED blink on P0.15 + USB CDC for 1200-baud bootloader re-entry.
# Without USB CDC, the board is unrecoverable without a RST pin.

CONFIG_GPIO=y

# USB CDC-ACM (new Zephyr USB stack)
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_UART_LINE_CTRL=y
CONFIG_HWINFO=y

# UF2 output — app starts at 0x1000 to match Adafruit bootloader
CONFIG_BUILD_OUTPUT_UF2=y
CONFIG_BUILD_OUTPUT_UF2_FAMILY_ID="0x239A00B3"
CONFIG_FLASH_LOAD_OFFSET=0x1000
CONFIG_FLASH_LOAD_SIZE=0xEE000

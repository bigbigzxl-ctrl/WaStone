# nice!nano Stage 1 — on-chip self-tests via USB CDC
# Tests: TEMP, RNG, TIMER0, RTC1, NVMC flash R/W, AES-ECB crypto

CONFIG_GPIO=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_PRINTK=y

# USB CDC-ACM console
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=y
CONFIG_CDC_ACM_SERIAL_PID=0x000B
CONFIG_CDC_ACM_SERIAL_PRODUCT_STRING="AEL nRF52840 Stage1"

# Peripheral drivers
CONFIG_ENTROPY_GENERATOR=y
CONFIG_ENTROPY_NRF5_RNG=y
CONFIG_COUNTER=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y

# Crypto (hardware AES-ECB via nRF CRYPTOCELL or direct ECB peripheral)
CONFIG_CRYPTO=y
CONFIG_CRYPTO_NRF_ECB=y
CONFIG_CRYPTO_INIT_PRIORITY=80

# UF2 output
CONFIG_BUILD_OUTPUT_UF2=y
CONFIG_BUILD_OUTPUT_UF2_FAMILY_ID="0x239A00B3"
CONFIG_FLASH_LOAD_OFFSET=0x1000
CONFIG_FLASH_LOAD_SIZE=0xEE000
